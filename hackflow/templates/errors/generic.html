{% extends "base.html" %}

{% block title %}Error - HackFlow{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <h1 class="display-1">{{ error.code }}</h1>
    <h2>{{ error.name }}</h2>
    <p class="lead">{{ error.description }}</p>
    <a href="{{ url_for('user.dashboard') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}

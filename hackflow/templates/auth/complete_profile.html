{% extends "base.html" %}

{% block title %}Complete Your Profile - HackFlow{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-dark">
                <div class="card-header">
                    <h2 class="text-center mb-0">Complete Your Profile</h2>
                    <p class="text-center text-muted mb-0">Please fill in your details to continue</p>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('auth.complete_profile') }}">
                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="college" class="form-label">College / Institution</label>
                            <input type="text" class="form-control" id="college" name="college" placeholder="Enter your college name">
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91 9876543210">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Complete Profile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
